tests:
  - name: integration-webhook-receive-ok
    request:
      provider: "partner"
      eventId: "e1"
      payload: {"k": 1}
    expect:
      status: "success"
  - name: integration-webhook-receive-rejected
    request:
      provider: "partner"
      eventId: "bad"
      payload: {}
    expectError:
      code: "UNAUTHORIZED"
